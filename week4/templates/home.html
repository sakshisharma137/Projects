<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Task Manager</span>

        <div>
            <a href="{{ url_for('home', username=username) }}" class="btn btn-primary">Home</a>

            <a href="{{ url_for('update_password', username=username) }}" class="btn btn-warning">
                Update Password
            </a>

            <a href="{{ url_for('delete_account', username=username) }}" class="btn btn-danger">
                Delete Account
            </a>

            <a href="{{ url_for('logout') }}" class="btn btn-light">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <h3>Welcome {{ username }}</h3>

    <form method="POST">

        <div class="mb-3">
            <label>Task Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Task Description</label>
            <textarea name="description" class="form-control" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">
            Add Task
        </button>

    </form>

    <hr>

    <h4>My Tasks</h4>

    {% for task in task_list %}

    <div class="card mb-3">
        <div class="card-body">
            <h5>{{ task.title }}</h5>
            <p>{{ task.description }}</p>
        </div>
    </div>

    {% endfor %}

</div>

</body>
</html>
